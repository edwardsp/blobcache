node_id = "node-vvh5j"

[cache]
dir = "/mnt/nvme/blobcache-cache"
max_bytes = 483183820800
chunk_size = 4194304

[azure]
pool_max_idle_per_host = 512

[cluster]
bind = "0.0.0.0:7771"
seeds = ["http://10.0.0.5:7771","http://10.0.0.6:7771","http://10.0.0.7:7771"]
advertise = "http://10.0.0.5:7771"

[transport]
kind = "rdma"
bind = "0.0.0.0:7772"
advertise = ["http://10.0.0.5:7772"]
chunk_concurrency = 32
peer_concurrency = 8
bloom_bits = 8388608
bloom_rebuild_secs = 30
bloom_pull_secs = 5
peer_max_candidates = 4

[stats]
bind = "0.0.0.0:7773"

[[mounts]]
name = "deepseek"
mountpoint = "/mnt/blobcache/deepseek"
account = "myaccount"
container = "models"
prefix = "models/test-prefix/"
