name: build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libfuse3-dev
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: lint
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy -D warnings
        run: cargo clippy --release --all-targets --locked -- -D warnings

  build:
    name: ${{ matrix.target }} (${{ matrix.features }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # blobcache is Linux-only: FUSE doesn't exist on macOS/Windows in
          # the form we use. CI builds the tcp-only variant for both the
          # dev arch (x86_64) and the gb300 cluster target (aarch64). The
          # ucx variant is intentionally not built here: ucx1-sys vendors
          # and rebuilds UCX 1.18.1 from source, which fails on modern
          # GCC's stricter -Werror flags, and even when it builds the
          # resulting binary has no RDMA support without MOFED on the
          # build host. UCX builds are produced by the container image
          # workflow (see deploy/Dockerfile) on a base with the proper
          # OFED/UCX stack matching the cluster.
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            features: tcp
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            features: tcp

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libfuse3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ matrix.features }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Unit tests
        run: cargo test --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          name="blobcached-${{ matrix.target }}-${{ matrix.features }}"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/release/blobcached" "dist/$name/"
          cp README.md "dist/$name/" 2>/dev/null || true
          cp LICENSE* "dist/$name/" 2>/dev/null || true
          cp examples/blobcached.toml "dist/$name/blobcached.toml.example" 2>/dev/null || true
          tar -C dist -czf "dist/$name.tar.gz" "$name"
          ( cd dist && shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256" )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blobcached-${{ matrix.target }}-${{ matrix.features }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  helm-lint:
    name: helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/blobcache
      - run: |
          helm template blobcache deploy/helm/blobcache \
            -f deploy/helm/blobcache/values.example.yaml \
            --set azure.clientId=00000000-0000-0000-0000-000000000000 \
            --set nodeSelector.agentPoolValue=test-pool > /dev/null

  release:
    needs: [lint, build, helm-lint]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
