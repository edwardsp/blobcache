apiVersion: v1
kind: Namespace
metadata:
  name: blobcache
---
# DaemonSet that prepares an NVMe RAID-0 on every GB300 node and exposes it
# at /mnt/nvme on the host. Idempotent: skips if already assembled.
# Lifted pattern from azcp deployment notes.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvme-raid-init
  namespace: blobcache
spec:
  selector:
    matchLabels: { app: nvme-raid-init }
  template:
    metadata:
      labels: { app: nvme-raid-init }
    spec:
      hostPID: true
      hostNetwork: true
      tolerations:
        - operator: Exists
      nodeSelector:
        kubernetes.azure.com/agentpool: gb300
      containers:
        - name: init
          image: mcr.microsoft.com/cbl-mariner/base/core:2.0
          securityContext:
            privileged: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eux
              tdnf install -y mdadm e2fsprogs util-linux nvme-cli || true
              # Use nsenter so mdadm/mkfs/mount act on the host namespace.
              nsenter -t 1 -m -u -i -n -p -- bash -c '
                set -eux
                mkdir -p /mnt/nvme
                if mountpoint -q /mnt/nvme; then
                  echo "already mounted"; exit 0
                fi
                if [ -b /dev/md/blobcache ] || [ -b /dev/md0 ]; then
                  MD=$(ls /dev/md/blobcache /dev/md0 2>/dev/null | head -n1)
                  mount "$MD" /mnt/nvme || true
                  exit 0
                fi
                # Find unused NVMe devices that are NOT the OS disk.
                DEVS=$(lsblk -dn -o NAME,TYPE,MOUNTPOINT | awk "\$2==\"disk\" && \$3==\"\" {print \$1}" | grep -E "^nvme" || true)
                COUNT=$(echo "$DEVS" | wc -w)
                if [ "$COUNT" -lt 1 ]; then echo "no spare NVMe devices"; exit 0; fi
                FULL=""
                for d in $DEVS; do FULL="$FULL /dev/$d"; done
                if [ "$COUNT" -ge 2 ]; then
                  yes | mdadm --create /dev/md/blobcache --level=0 --raid-devices=$COUNT --name=blobcache $FULL
                  MD=/dev/md/blobcache
                else
                  MD=$(echo $FULL | awk "{print \$1}")
                fi
                mkfs.ext4 -F -E nodiscard -L blobcache "$MD"
                mount -o noatime,nodiratime "$MD" /mnt/nvme
                chmod 1777 /mnt/nvme
              '
              # keep alive so the DS stays "Running"
              sleep infinity
          volumeMounts:
            - { name: host-root, mountPath: /host, mountPropagation: Bidirectional }
      volumes:
        - name: host-root
          hostPath: { path: / }
---
# Test harness DaemonSet: copies the locally-built blobcached binary onto the
# nodes (via initContainer pulling from a ConfigMap-mounted dir is too small;
# we instead rely on `kubectl cp` after pod is running) and runs it.
# For first-bringup we keep this as a long-lived shell that we exec into.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: blobcached
  namespace: blobcache
spec:
  selector:
    matchLabels: { app: blobcached }
  template:
    metadata:
      labels: { app: blobcached }
    spec:
      hostNetwork: true
      hostPID: false
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.azure.com/agentpool: gb300
        blobcache.test/enabled: "true"
      tolerations:
        - operator: Exists
      containers:
        - name: blobcached
          image: ubuntu:24.04
          securityContext:
            privileged: true
            capabilities:
              add: ["SYS_ADMIN", "IPC_LOCK"]
          resources:
            limits:
              rdma/ib: 1
            requests:
              rdma/ib: 1
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -eux
              apt-get update -qq
              apt-get install -y -qq fuse3 ca-certificates curl jq iproute2 \
                libucx0 libibverbs1 librdmacm1t64 ucx-utils ibverbs-utils
              modprobe fuse || true
              mkdir -p /mnt/nvme/blobcache-cache /mnt/nvme/blobcache-mnt
              echo "container ready; waiting for binary at /opt/blobcache/blobcached"
              while ! [ -x /opt/blobcache/blobcached ]; do sleep 5; done
              echo "binary present, launching"
              exec /opt/blobcache/blobcached --config /opt/blobcache/blobcached.toml
          env:
            - { name: RUST_LOG, value: "info,blobcache=debug" }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            # Disambiguates the gb300 VMSS user-assigned identity that has
            # Storage Blob Data Contributor on myaccount.
            - { name: AZURE_CLIENT_ID, value: "00000000-0000-0000-0000-000000000000" }
            - { name: UCX_NET_DEVICES, value: "mlx5_0:1" }
            - { name: UCX_TLS, value: "rc,sm,self" }
          volumeMounts:
            - { name: nvme,    mountPath: /mnt/nvme, mountPropagation: HostToContainer }
            - { name: fuse,    mountPath: /dev/fuse }
            - { name: opt,     mountPath: /opt/blobcache }
      volumes:
        - { name: nvme, hostPath: { path: /mnt/nvme } }
        - { name: fuse, hostPath: { path: /dev/fuse } }
        - { name: opt,  emptyDir: {} }
