# Example overrides for `helm install -f`.
# Copy to `myvalues.yaml`, fill in the placeholders, then:
#
#   helm install blobcache ./deploy/helm/blobcache -f myvalues.yaml
#
# All values shown here override defaults from values.yaml.

namespace:
  create: true
  name: blobcache

# REQUIRED: pin to your RDMA-capable nodepool.
nodeSelector:
  agentPoolKey: kubernetes.azure.com/agentpool
  agentPoolValue: "myagentpool"          # <— your AKS nodepool name
  testLabelKey: blobcache.test/enabled
  testLabelValue: "true"

# Disambiguate which user-assigned MSI to use (when the VMSS has more than
# one). The MSI must have Storage Blob Data Reader on the target account.
azure:
  clientId: "<msi-client-id>"            # <— guid of your user-assigned MSI

# Override only if your cluster uses a different IB device name or RDMA plugin.
ucx:
  netDevices: "mlx5_0:1"
  tls: "rc,ud,sm,self"
  ibAddrType: "auto"
  rndvThresh: "64K"
  zcopyThresh: "64K"
  rndvScheme: "put_zcopy"
  maxRndvRails: "1"
  logLevel: "info"

rdma:
  enabled: true
  resourceName: rdma/ib
  count: 1

# REQUIRED: at least one mount entry.
config:
  mounts:
    - name: models
      mountpoint: /mnt/nvme/blobcache-mnt/models
      account: "<storage-account>"       # <— your account name
      container: models
      prefix: ""
      # sasToken: ""                     # optional; omit for managed identity

# Example: tighter logging on a stable cluster.
# rustLog: "info"

# Example: pin to a specific image digest instead of the rolling :main tag.
# image:
#   blobcached:
#     repository: ghcr.io/edwardsp/blobcache
#     tag: "sha-da10404"
