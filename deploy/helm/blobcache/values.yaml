# Default values for blobcache.
# This is a YAML-formatted file.
#
# All site-specific values are EMPTY by default. You MUST supply at least
# `nodeSelector.agentPoolValue` (e.g. via `-f myvalues.yaml` or `--set`)
# and at least one entry in `config.mounts`.
# See `values.example.yaml` for a worked example.

# -- Namespace control. If `create` is true the chart will render a Namespace
# manifest named `name`. If false, the resources are installed into the release
# namespace and you are responsible for creating it.
namespace:
  create: true
  name: blobcache

# -- Container images for each component.
image:
  blobcached:
    repository: ghcr.io/edwardsp/blobcache
    tag: main
    pullPolicy: IfNotPresent
  nvmeRaid:
    repository: mcr.microsoft.com/cbl-mariner/base/core
    tag: "2.0"
    pullPolicy: IfNotPresent

# -- Optional image pull secrets (e.g. for a private GHCR package).
# Set to a list of LocalObjectReference, e.g.:
#   imagePullSecrets:
#     - name: ghcr-pull-secret
imagePullSecrets: []

# -- Node targeting. Both DaemonSets are pinned to nodes carrying
# `agentPoolKey=agentPoolValue`. The blobcached DS additionally requires
# `testLabelKey=testLabelValue` so you can opt nodes in/out of the test pool.
#
# REQUIRED: set `agentPoolValue` to your cluster's RDMA-capable nodepool name.
nodeSelector:
  agentPoolKey: kubernetes.azure.com/agentpool
  agentPoolValue: ""
  testLabelKey: blobcache.test/enabled
  testLabelValue: "true"

# -- Pod tolerations. Defaults to "tolerate everything" so the DaemonSets land
# on tainted system nodepools too.
tolerations:
  - operator: Exists

# -- Azure auth. `clientId` is the user-assigned managed identity client-id
# that holds Storage Blob Data Reader (or higher) on the target storage
# account(s). Leave empty to fall back to system-assigned MSI / IMDS default
# (the AZURE_CLIENT_ID env var is omitted entirely when empty).
azure:
  clientId: ""

# -- UCX / RDMA tuning. These map directly to UCX_* env vars on the
# blobcached container.
ucx:
  netDevices: "mlx5_0:1"
  tls: "rc,ud,sm,self"
  ibAddrType: "auto"
  rndvThresh: "64K"
  zcopyThresh: "64K"
  rndvScheme: "put_zcopy"
  maxRndvRails: "1"
  logLevel: "info"
  # RC QP timeouts. Without these UCX inherits driver defaults that
  # effectively never time out a stuck QP, so a single misbehaving
  # peer wedges the daemon's Fetcher (FUSE read() blocks forever and
  # endpoint_error_cb's reaper never recreates the slot because
  # in_flight stays > 0). The 17-node DeepSeek-R1 e2e showed five
  # peers in this exact stall state. 30s + 8 retries gives the fabric
  # plenty of head-room while still letting endpoint_error_cb fire.
  rcTimeout: "30s"
  rcRnrTimeout: "30s"
  rcRetryCount: "8"

# -- RUST_LOG value for the blobcached container.
rustLog: "info,blobcache=debug"

# -- RDMA device request. Only meaningful if the cluster has the SR-IOV IB
# device plugin installed and exposing `rdma/ib` (or equivalent) as an
# extended resource.
rdma:
  enabled: true
  resourceName: rdma/ib
  count: 1

# -- Host paths used by the blobcached DS. `nvme` is where the NVMe RAID
# init DS mounts the assembled array on the host.
hostPaths:
  nvme: /mnt/nvme

# -- Observability. When `enabled`, renders a `PodMonitor` (scraping each
# blobcached pod's :7773/metrics endpoint) and a Grafana dashboard
# `ConfigMap` (auto-imported by the standard kube-prometheus Grafana
# sidecar via the `grafana_dashboard: "1"` label).
#
# `podMonitor.releaseLabel` MUST match your Prometheus instance's
# `podMonitorSelector` — for kube-prometheus-stack the convention is
# `release: <helm-release-name>` (default: `kube-prometheus`).
#
# `grafanaDashboard.namespace` controls where the dashboard CM is created.
# kube-prometheus's Grafana sidecar runs with `NAMESPACE=ALL` by default
# so any namespace works; leave empty to use the chart's namespace.
monitoring:
  enabled: true
  podMonitor:
    interval: 15s
    scrapeTimeout: 10s
    releaseLabel: kube-prometheus
  grafanaDashboard:
    enabled: true
    namespace: ""               # blank = chart namespace    folder: blobcache
    datasourceName: Prometheus  # must match your Grafana datasource name

# Liveness / readiness probes for the blobcached container. Both hit the
# stats HTTP server on port 7773. /healthz is a constant 200 (catches a
# fully wedged daemon: hung tokio runtime, lost NVMe). /readyz returns 200
# only once gossip has at least one Alive member, so peers don't hammer
# a node that's still joining.
probes:
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

# -- blobcached.toml contents, rendered into a ConfigMap and mounted at
# /etc/blobcached.toml. `node_id` is intentionally omitted: the daemon
# falls back to hostname() which, with hostNetwork=true, equals the
# Kubernetes node name (so each pod gets a unique id automatically).
config:
  cache:
    dir: /mnt/nvme/blobcache-cache
    # 10 TiB. The nvme-raid-init DS assembles ~14 TiB of striped NVMe at
    # /mnt/nvme on each gb300 node; this leaves filesystem headroom while
    # letting working sets up to ~10 TiB stay locally cached after the
    # first read (eliminates RDMA peer-fetches for re-reads of the same
    # dataset). Lower this if you're sharing the RAID with other
    # workloads.
    maxBytes: 10995116277760    # 10 TiB
    chunkSize: 4194304          # 4 MiB; MUST match across cluster
    cacheOnPeerFetch: true      # false = peer-fetched chunks bypass local NVMe cache
                                # (blob fetches always cache regardless); maximises
                                # effective cluster cache capacity by avoiding
                                # replication and removes the cache-write from the
                                # peer-read hot path
    peerLruBytes: 1073741824    # 1 GiB in-memory LRU of peer-fetched chunks; only
                                # consulted when cacheOnPeerFetch=false, prevents
                                # FUSE's ~32 sub-reads per chunk from triggering 32
                                # peer fetches. 0 = disable.
  azure:
    poolMaxIdlePerHost: 512
    workers: 8                  # production default; bumping above 8 has not shown a Phase A win
    mainWorkerThreads: 8        # cap main tokio runtime worker threads (FUSE/gossip/peer-server/stats);
                                # 8 measured -10% PASS1 wall vs num_cpus()=128 default on GB300
    blockSize: 4194304          # 4 MiB; 0 = use cache.chunkSize
  cluster:
    bind: "0.0.0.0:7771"
    seeds: []                   # e.g. ["http://10.0.0.5:7771"]
    advertise: ""               # blank = derived from local NIC
  transport:
    kind: rdma                  # "tcp" or "rdma" (image is built --features ucx)
    bind: "0.0.0.0:7772"
    advertise: []               # e.g. ["http://10.0.0.6:7772"]
    chunkConcurrency: 32        # production default; matches single-account Azure throttle envelope
    peerConcurrency: 32
    prefetchDepth: 0
    prefetchThreshold: 3
    prefetchConcurrency: 4
    prefetchOriginOnly: false
    bloomBits: 8388608          # 1 MiB / peer
    bloomRebuildSecs: 30
    bloomPullSecs: 5
    peerMaxCandidates: 4
    peerMaxYesAttempts: 2
    peerMaxMaybeAttempts: 2
    stampedeWaitMs: 5000
  stats:
    bind: "0.0.0.0:7773"
  # REQUIRED: at least one mount entry. Each entry becomes a [[mounts]]
  # block in blobcached.toml.
  mounts: []
    # - name: models
    #   mountpoint: /mnt/nvme/blobcache-mnt/models
    #   account: myaccount
    #   container: models
    #   prefix: ""
    #   sasToken: ""             # optional; omit for managed identity
