apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "blobcache.fullname" . }}-blobcached
  namespace: {{ include "blobcache.namespace" . }}
  labels:
    {{- include "blobcache.labels" . | nindent 4 }}
    app.kubernetes.io/component: blobcached
spec:
  selector:
    matchLabels:
      {{- include "blobcache.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: blobcached
  template:
    metadata:
      labels:
        {{- include "blobcache.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: blobcached
      annotations:
        # Roll pods when the rendered blobcached.toml changes.
        checksum/config: {{ include (print $.Template.BasePath "/blobcached-configmap.yaml") . | sha256sum }}
    spec:
      hostNetwork: true
      hostPID: false
      dnsPolicy: ClusterFirstWithHostNet
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.nodeSelector.agentPoolValue (and .Values.nodeSelector.testLabelKey .Values.nodeSelector.testLabelValue) }}
      nodeSelector:
        {{- if .Values.nodeSelector.agentPoolValue }}
        {{ .Values.nodeSelector.agentPoolKey }}: {{ .Values.nodeSelector.agentPoolValue | quote }}
        {{- end }}
        {{- if and .Values.nodeSelector.testLabelKey .Values.nodeSelector.testLabelValue }}
        {{ .Values.nodeSelector.testLabelKey }}: {{ .Values.nodeSelector.testLabelValue | quote }}
        {{- end }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: blobcached
          image: "{{ .Values.image.blobcached.repository }}:{{ .Values.image.blobcached.tag }}"
          imagePullPolicy: {{ .Values.image.blobcached.pullPolicy }}
          # Image entrypoint is /usr/local/bin/blobcached; CMD defaults to
          # `--config /etc/blobcached.toml`. Config is mounted from the
          # ConfigMap below; runtime UCX/FUSE libs are baked into the image.
          securityContext:
            privileged: true
            capabilities:
              add: ["SYS_ADMIN", "IPC_LOCK"]
          {{- if .Values.rdma.enabled }}
          resources:
            limits:
              {{ .Values.rdma.resourceName }}: {{ .Values.rdma.count }}
            requests:
              {{ .Values.rdma.resourceName }}: {{ .Values.rdma.count }}
          {{- end }}
          env:
            - name: RUST_LOG
              value: {{ .Values.rustLog | quote }}
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- if .Values.azure.clientId }}
            - name: AZURE_CLIENT_ID
              value: {{ .Values.azure.clientId | quote }}
            {{- end }}
            - name: UCX_NET_DEVICES
              value: {{ .Values.ucx.netDevices | quote }}
            - name: UCX_TLS
              value: {{ .Values.ucx.tls | quote }}
            - name: UCX_IB_ADDR_TYPE
              value: {{ .Values.ucx.ibAddrType | quote }}
            - name: UCX_RNDV_THRESH
              value: {{ .Values.ucx.rndvThresh | quote }}
            - name: UCX_ZCOPY_THRESH
              value: {{ .Values.ucx.zcopyThresh | quote }}
            - name: UCX_RNDV_SCHEME
              value: {{ .Values.ucx.rndvScheme | quote }}
            - name: UCX_MAX_RNDV_RAILS
              value: {{ .Values.ucx.maxRndvRails | quote }}
            - name: UCX_LOG_LEVEL
              value: {{ .Values.ucx.logLevel | quote }}
            - name: UCX_RC_TIMEOUT
              value: {{ .Values.ucx.rcTimeout | quote }}
            - name: UCX_RC_RNR_TIMEOUT
              value: {{ .Values.ucx.rcRnrTimeout | quote }}
            - name: UCX_RC_RETRY_COUNT
              value: {{ .Values.ucx.rcRetryCount | quote }}
          ports:
            - name: gossip
              containerPort: 7771
              protocol: TCP
            - name: peer
              containerPort: 7772
              protocol: TCP
            - name: stats
              containerPort: 7773
              protocol: TCP
          volumeMounts:
            - name: nvme
              mountPath: {{ .Values.hostPaths.nvme }}
              mountPropagation: HostToContainer
            - name: fuse
              mountPath: /dev/fuse
            - name: config
              mountPath: /etc/blobcached.toml
              subPath: blobcached.toml
              readOnly: true
      volumes:
        - name: nvme
          hostPath:
            path: {{ .Values.hostPaths.nvme }}
        - name: fuse
          hostPath:
            path: /dev/fuse
        - name: config
          configMap:
            name: {{ include "blobcache.fullname" . }}-blobcached
