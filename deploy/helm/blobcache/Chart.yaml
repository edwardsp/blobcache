apiVersion: v2
name: blobcache
description: |
  Distributed FUSE-mounted Azure Blob cache for high-throughput AI/HPC clusters.
  Deploys an NVMe RAID-0 init DaemonSet and the blobcached DaemonSet on
  RDMA-capable nodes (e.g. NVIDIA GB300 with InfiniBand).
type: application
version: 0.1.0
appVersion: "2.9.1"
kubeVersion: ">=1.27.0-0"
keywords:
  - blob
  - cache
  - fuse
  - rdma
  - azure
sources:
  - https://github.com/anomalyco/blobcache
