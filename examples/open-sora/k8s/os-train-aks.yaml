# Open-Sora v2 x blobcache — 64-node training on AKS (the Kubernetes port of
# examples/open-sora/os-train.sbatch). One StatefulSet *is* the job: each pod runs
# a privileged blobcached sidecar (cache on ACStor local NVMe, peer-fetch over IB)
# plus the os-train container, sharing the /blobcache FUSE mount. Provisioned for
# the job and torn down with it — no DaemonSet, no shared NFS.
#
# COLD run (the one we reproduce): weights are hydrated (broadcast) to every node;
# the Pexels dataset is NOT hydrated — it streams live from Blob on first touch.
#
# Render + apply (one pod per GPU node; run 64, keep spares cordoned):
#   export REPLICAS=64 IMAGE=ghcr.io/edwardsp/blobcache/os-train:main \
#          MI_CLIENT_ID=<kubelet client id> \
#          STORAGE_ACCOUNT=<sa> \
#          PEXELS_CONTAINER=<c> PEXELS_PREFIX=<path/to/pexels> \
#          OSV2_CONTAINER=<c>   OSV2_PREFIX=<path/to/opensora-v2>
#   kubectl create configmap ndv5-topo --from-file=ndv5-topo.xml=ndv5-topo.xml \
#       --dry-run=client -o yaml | kubectl apply -f -
#   envsubst < os-train-aks.yaml | kubectl apply -f -
#
# NOTE (untested): first end-to-end draft. The os-train image (PR #12) must build,
# and pyshim must be baked, before this runs faithfully.
---
apiVersion: v1
kind: Service
metadata:
  name: os-train
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector: { app: os-train }
  ports:
    - { name: gossip, port: 7771 }
    - { name: peer, port: 7772 }
    - { name: stats, port: 7773 }
    - { name: rdzv, port: 29502 }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: os-train-blobcached
data:
  blobcached.toml: |
    [cache]
    dir = "/mnt/nvme/blobcache-cache"
    max_bytes = 1099511627776
    chunk_size = 4194304
    [azure]
    pool_max_idle_per_host = 512
    workers = 4
    main_worker_threads = 8
    block_size = 0
    [cluster]
    bind = "0.0.0.0:7771"
    seeds = ["http://os-train-0.os-train:7771"]
    [transport]
    bind = "0.0.0.0:7772"
    chunk_concurrency = 32
    peer_concurrency = 8
    prefetch_depth = 16
    prefetch_threshold = 3
    prefetch_concurrency = 32
    bloom_bits = 8388608
    bloom_rebuild_secs = 30
    bloom_pull_secs = 5
    peer_max_candidates = 4
    peer_max_yes_attempts = 2
    peer_max_maybe_attempts = 2
    stampede_wait_ms = 5000
    [stats]
    bind = "0.0.0.0:7773"
    [[mounts]]
    name = "pexels"
    mountpoint = "/blobcache/pexels"
    account = "${STORAGE_ACCOUNT}"
    container = "${PEXELS_CONTAINER}"
    prefix = "${PEXELS_PREFIX}"
    [[mounts]]
    name = "osv2"
    mountpoint = "/blobcache/osv2"
    account = "${STORAGE_ACCOUNT}"
    container = "${OSV2_CONTAINER}"
    prefix = "${OSV2_PREFIX}"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: os-train
spec:
  serviceName: os-train
  replicas: ${REPLICAS}
  podManagementPolicy: Parallel
  selector:
    matchLabels: { app: os-train }
  template:
    metadata:
      labels: { app: os-train }
    spec:
      # one pod per GPU node
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector: { matchLabels: { app: os-train } }
              topologyKey: kubernetes.io/hostname
      tolerations:
        - { key: sku, operator: Equal, value: gpu, effect: NoSchedule }
      containers:
        # --- blobcached: ACStor NVMe cache + IB peer-fetch, FUSE at /blobcache ---
        - name: blobcached
          image: ghcr.io/edwardsp/blobcache:main
          securityContext: { privileged: true }
          env:
            - { name: POD_IP, valueFrom: { fieldRef: { fieldPath: status.podIP } } }
            - { name: AZURE_CLIENT_ID, value: "${MI_CLIENT_ID}" }
            - { name: UCX_TLS, value: "rc,sm,self" }
            - { name: UCX_NET_DEVICES, value: "mlx5_0:1,mlx5_1:1,mlx5_2:1,mlx5_3:1,mlx5_4:1,mlx5_5:1,mlx5_6:1,mlx5_7:1" }
          command: ["/bin/bash", "-c"]
          args:
            - |
              cp /etc/blobcached.toml /tmp/bc.toml
              sed -i "s#^seeds = .*#&\nadvertise = \"http://${POD_IP}:7771\"#" /tmp/bc.toml
              exec blobcached --config /tmp/bc.toml
          ports:
            - { name: gossip, containerPort: 7771 }
            - { name: peer, containerPort: 7772 }
            - { name: stats, containerPort: 7773 }
          volumeMounts:
            - { name: cache, mountPath: /mnt/nvme }
            - { name: fuse, mountPath: /blobcache, mountPropagation: Bidirectional }
            - { name: bccfg, mountPath: /etc/blobcached.toml, subPath: blobcached.toml, readOnly: true }
        # --- os-train: 8 GPUs + 8 IB; waits for blobcache, rank-0 hydrates weights ---
        - name: os-train
          image: ${IMAGE}
          securityContext: { capabilities: { add: ["IPC_LOCK"] } }
          resources:
            limits: { nvidia.com/gpu: 8, rdma/ib: 8 }
          env:
            - { name: NNODES, value: "${REPLICAS}" }
            - { name: MASTER_ADDR, value: "os-train-0.os-train" }
            - { name: MASTER_PORT, value: "29502" }
            - { name: PEXELS_META_CSV, value: "/blobcache/pexels/pexels_meta.csv" }
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -uo pipefail
              RANK=${HOSTNAME##*-}
              echo "[wait] blobcached cluster + osv2 mount (rank=$RANK)"
              until curl -fsS http://127.0.0.1:7773/healthz >/dev/null 2>&1; do sleep 2; done
              until [ -d /blobcache/osv2 ] && [ -d /blobcache/pexels ]; do sleep 2; done
              # wait for the gossip cluster to reach full membership before hydrate
              until [ "$(curl -fsS http://127.0.0.1:7773/peers 2>/dev/null | grep -c Alive)" -ge "$((NNODES-1))" ]; do sleep 3; done
              if [ "$RANK" = "0" ]; then
                echo "[hydrate] clear-cache + broadcast weights (cold: dataset NOT hydrated)"
                curl -fsS -XPOST http://127.0.0.1:7773/clear-cache >/dev/null || true
                JID=$(curl -fsS -XPOST "http://127.0.0.1:7773/hydrate?async=1" \
                      -d '{"mount":"osv2","path":"","recursive":true,"mode":"broadcast"}' | grep -oE '"job_id":"[^"]+"' | cut -d'"' -f4)
                echo "[hydrate] osv2 job=$JID"
                until [ "$(curl -fsS http://127.0.0.1:7773/hydrate/$JID 2>/dev/null | grep -oE '"status":"[^"]+"' | cut -d'"' -f4)" = "completed" ]; do sleep 5; done
                echo "[hydrate] weights done; starting training (rank-0 joins rendezvous last)"
              fi
              # non-0 ranks reach torchrun first and block at the c10d rendezvous until
              # rank-0 (post-hydrate) joins — so the checkpoint load happens after hydrate.
              exec /usr/local/bin/os-train-entrypoint
          volumeMounts:
            - { name: fuse, mountPath: /blobcache, mountPropagation: HostToContainer }
            - { name: cache, mountPath: /mnt/nvme }
            - { name: dshm, mountPath: /dev/shm }
            - { name: topo, mountPath: /etc/topology, readOnly: true }
            - { name: metrics, mountPath: /metrics }
        # --- metrics sampler: per-node /metrics CSV (the open-sora plotters' input) ---
        - name: metrics
          image: ghcr.io/edwardsp/blobcache:main
          command: ["/bin/bash", "-c"]
          args:
            - |
              H=$(hostname); OUT=/metrics/cold-$H.csv
              echo "epoch_ms,host,blob_fetches,blob_bytes,peer_fetches,peer_bytes,cache_hits,cache_misses,cache_bytes,fuse_reads,fuse_read_bytes" > "$OUT"
              g(){ awk -v k="$1" '$1==k{print $2; f=1} END{if(!f)print 0}' /tmp/m 2>/dev/null; }
              while true; do
                curl -fsS http://127.0.0.1:7773/metrics > /tmp/m 2>/dev/null
                echo "$(date +%s%3N),$H,$(g blobcache_blob_fetches_total),$(g blobcache_blob_fetch_bytes_total),$(g blobcache_peer_fetches_ok_total),$(g blobcache_peer_fetch_bytes_total),$(g blobcache_cache_hits_total),$(g blobcache_cache_misses_total),$(g blobcache_cache_bytes),$(g blobcache_fuse_reads_total),$(g blobcache_fuse_read_bytes_total)" >> "$OUT"
                sleep 5
              done
          volumeMounts:
            - { name: metrics, mountPath: /metrics }
      volumes:
        - { name: fuse, emptyDir: {} }
        - { name: dshm, emptyDir: { medium: Memory } }
        - { name: metrics, emptyDir: {} }
        - { name: bccfg, configMap: { name: os-train-blobcached } }
        - { name: topo, configMap: { name: ndv5-topo } }
  volumeClaimTemplates:
    - metadata:
        name: cache
        annotations: { localdisk.csi.acstor.io/accept-ephemeral-storage: "true" }
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-csi
        resources: { requests: { storage: 2000Gi } }
