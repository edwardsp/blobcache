node_id = "node-local"

[cache]
dir = "/tmp/blobcache-cache"
max_bytes = 1073741824        # 1 GiB
chunk_size = 4194304          # 4 MiB

[azure]
pool_max_idle_per_host = 512
workers = 1                   # v2.9: independent tokio runtimes for blob fetch; try 4-8 for higher per-node hydrate throughput
main_worker_threads = 8       # main tokio runtime worker cap (FUSE/gossip/peer-server/stats); 8 avoids work-stealing atomic overhead seen with num_cpus() default on high-core hosts
block_size = 0                # v2.9: azure GET size in bytes; 0 = use cache.chunk_size

[cluster]
bind = "0.0.0.0:7771"
seeds = []

[transport]
bind = "0.0.0.0:7772"
chunk_concurrency = 32
peer_concurrency = 8
prefetch_depth = 16
prefetch_threshold = 3
prefetch_concurrency = 32
bloom_bits = 8388608          # 1 MiB / peer; FP ~0.024% at 100k entries
bloom_rebuild_secs = 30
bloom_pull_secs = 5
peer_max_candidates = 4
peer_max_yes_attempts = 2
peer_max_maybe_attempts = 2
stampede_wait_ms = 5000

[stats]
bind = "0.0.0.0:7773"

# [admin]
# token = "your-secret"   # optional; when set, /clear-cache* and /hydrate* require Authorization: Bearer <token>

[[mounts]]
name = "models"
mountpoint = "/tmp/blobcache-mnt/models"
account = "myaccount"
container = "models"
prefix = ""
